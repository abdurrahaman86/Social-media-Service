<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ১. SEO এবং ইমেজ প্রিভিউ মেটা ট্যাগ (ইমেজ ও টাইটেল সহ) -->
    <title>Digital Marketing Expert | Nahid Hossen</title>
    <meta name="description" content="অর্গানিক লাইফ টাইম গ্যারান্টি সহ সোশ্যাল মিডিয়া মার্কেটিং সার্ভিস। আমরা ফেসবুক ফলোয়ার, ইউটিউব সাবস্ক্রাইবার এবং টিকটক এনগেজমেন্ট প্রদান করি।">
    
    <!-- Open Graph (Facebook/Social Media Preview) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Digital Marketing & Social Media Services">
    <meta property="og:description" content="লাইফ টাইম গ্যারান্টি সহ প্রফেশনাল সোশ্যাল মিডিয়া সার্ভিস পান।">
    <meta property="og:image" content="https://uploads.onecompiler.io/44mtbptam/44mubpy9r/13282.png">
    <meta property="og:url" content="https://digital-marketing-expert-bangladesh-wheat.vercel.app/">

    <!-- ৩. স্ক্রিপ্ট এবং স্টাইল শিট -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        .service-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- নেভিগেশন বার -->
    <nav class="bg-[#0f172a] p-4 flex justify-between items-center text-white sticky top-0 z-50 shadow-lg">
        <h1 class="text-xl font-black">Digital <span class="text-blue-500">Marketing</span></h1>
        <a href="https://wa.me/8801968405571" class="bg-green-600 px-4 py-2 rounded-full text-xs font-bold hover:bg-green-700 transition">
            <i class="fab fa-whatsapp"></i> 24/7 Active
        </a>
    </nav>

    <!-- হিরো এবং সার্ভিস সেকশন -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <a href="#pay" class="block mb-10 overflow-hidden rounded-3xl shadow-xl">
            <img src="https://uploads.onecompiler.io/44erpqqpq/44es5b5ay/7526.webp" alt="Service Banner" class="w-full h-auto hover:scale-105 transition duration-500">
        </a>
        
        <h2 class="text-3xl font-black mb-4 text-center">Social Media Service</h2>
        <p class="text-center text-slate-600 mb-10">ডিজিটাল মার্কেটিং প্ল্যাটফর্মে আপনাকে স্বাগতম। আমরা নিয়ে এসেছি অর্গানিক লাইফ টাইম গ্যারান্টি সহকারে বিভিন্ন ধরনের সার্ভিস।</p>
        
        <div id="services-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Firebase থেকে সার্ভিসগুলো এখানে লোড হবে -->
        </div>
    </section>

    <!-- পেমেন্ট এবং অর্ডার ফর্ম -->
    <section id="pay" class="max-w-xl mx-auto px-6 py-10">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-blue-100">
            <img src="https://uploads.onecompiler.io/44erpqqpq/44ew7fn27/7640.gif" alt="Order Gif" class="w-full h-auto mb-6 rounded-2xl">
            
            <h3 class="text-2xl font-black mb-4 text-center text-blue-600">Order Checkout Form</h3>
            <p class="text-center text-sm text-slate-500 mb-6">নিচের ফর্মটি পূরণ করুন, আমাদের প্রতিনিধি খুব দ্রুত আপনার সাথে যোগাযোগ করবে।</p>
            
            <form id="userPaymentForm" class="space-y-4">
                <input type="text" id="uName" placeholder="আপনার নাম" class="w-full p-4 rounded-xl bg-slate-50 outline-none border focus:border-blue-500 transition" required>
                <input type="text" id="uPhone" placeholder="আপনার ফোন নম্বর" class="w-full p-4 rounded-xl bg-slate-50 outline-none border focus:border-blue-500 transition" required>
                <input type="text" id="uTrx" placeholder="সার্ভিসের নাম এবং ডিটেইলস লিখুন..." class="w-full p-4 rounded-xl bg-slate-50 outline-none border focus:border-blue-500 transition" required>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition transform active:scale-95">Submit Request</button>
            </form>
            
            <p id="statusMsg" class="mt-6 text-center font-bold text-green-600 hidden bg-green-50 p-4 rounded-xl border border-green-200"></p>
            
            <img src="https://uploads.onecompiler.io/44erpqqpq/44f8wvahy/8037.png" alt="Payment Methods" class="w-full h-auto mt-6">
        </div>
    </section>

    <!-- ফুটার ইমেজ -->
    <div class="max-w-7xl mx-auto px-6 pb-10">
        <img src="https://uploads.onecompiler.io/44erpqqpq/44erpt4ff/7485.png" alt="Footer Banner" class="w-full h-auto rounded-3xl shadow-md">
    </div>

    <!-- ৪. Firebase লজিক এবং স্ক্রিপ্ট -->
    <script>
        // আপনার দেওয়া Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyC46mnAjWV65Ty4KxB903s1O3l92z16SRk",
            authDomain: "callsmspanel.firebaseapp.com",
            databaseURL: "https://callsmspanel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "callsmspanel",
            storageBucket: "callsmspanel.firebasestorage.app",
            messagingSenderId: "110135980756",
            appId: "1:110135980756:web:5b70189d71e2fa0c9d8141"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Firebase থেকে সার্ভিস লোড করা
        db.ref('services').on('value', (snapshot) => {
            const container = document.getElementById('services-container');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const s = child.val();
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm service-card">
                        <h4 class="text-xl font-black text-blue-600 mb-2">${s.name}</h4>
                        <p class="text-slate-500 text-sm mb-4">${s.desc}</p>
                        <p class="text-lg font-bold text-slate-800 mb-4">Price: ${s.price} TK</p>
                        <a href="#pay" class="bg-slate-900 text-white px-6 py-2 rounded-lg text-xs font-bold inline-block hover:bg-blue-600 transition">Order Now</a>
                    </div>
                `;
            });
        });

        // অর্ডার সাবমিট করা
        document.getElementById('userPaymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                trxid: document.getElementById('uTrx').value,
                status: "Pending",
                time: new Date().toLocaleString()
            };
            db.ref('orders').push(payload).then(() => {
                const status = document.getElementById('statusMsg');
                status.innerText = "ধন্যবাদ 🤗 আপনার রিকোয়েস্ট পাঠানো হয়েছে। একজন প্রতিনিধি খুব শীঘ্রই আপনার সাথে যোগাযোগ করবে।";
                status.classList.remove('hidden');
                this.reset();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
