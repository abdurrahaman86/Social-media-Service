    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC46mnAjWV65Ty4KxB903s1O3l92z16SRk",
            authDomain: "callsmspanel.firebaseapp.com",
            databaseURL: "https://callsmspanel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "callsmspanel",
            storageBucket: "callsmspanel.firebasestorage.app",
            messagingSenderId: "110135980756",
            appId: "1:110135980756:web:5b70189d71e2fa0c9d8141"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Services from Firebase
        db.ref('services').on('value', (snapshot) => {
            const container = document.getElementById('services-container');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const s = child.val();
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <h4 class="text-xl font-black text-blue-600 mb-2">${s.name}</h4>
                        <p class="text-slate-500 text-sm mb-4">${s.desc}</p>
                        <p class="text-lg font-bold text-slate-800 mb-4">Price: ${s.price} TK</p>
                        <a href="#pay" class="bg-slate-900 text-white px-6 py-2 rounded-lg text-xs font-bold inline-block">Order Now</a>
                    </div>
                `;
            });
        });

        // Submit Payment
        document.getElementById('userPaymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                trxid: document.getElementById('uTrx').value,
                status: "Pending", // Default status
                time: new Date().toLocaleString()
            };
            db.ref('orders').push(payload).then(() => {
                document.getElementById('statusMsg').innerText = "ধন্যবাদ 🤗 আপনার রিকোয়েস্ট পাঠানো হয়েছে। 🫠 একজন প্রতিনিধি টিম  খুব শীঘ্রই আপনার সাথে যোগাযোগ করবে ।";
                document.getElementById('statusMsg').classList.remove('hidden');
                this.reset();
            });
        });
    </script>
